<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qarm Robot Simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 15px;
        }

        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .main-content {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .plot-container {
            flex: 1;
            min-width: 300px;
            background: white;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .plot-container img {
            width: 100%;
            height: auto;
            border-radius: 10px;
        }

        .controls {
            flex: 0 0 320px;
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-height: 600px;
            overflow-y: auto;
        }

        .control-section {
            margin-bottom: 15px;
        }

        .control-section h3 {
            font-size: 1rem;
            color: #1e3c72;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 2px solid #2a5298;
        }

        .joint-controls {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .joint-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .joint-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .joint-btn:active {
            transform: translateY(0);
        }

        .joint-btn.j1 { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .joint-btn.j2 { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .joint-btn.j3 { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
        .joint-btn.j4 { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }

        .view-btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            border: none;
            border-radius: 8px;
            background: #f0f0f0;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .view-btn:hover {
            background: #e0e0e0;
        }

        .action-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin-bottom: 8px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-random {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-reset {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #333;
        }

        .status {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-top: 10px;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
            }

            .controls {
                flex: none;
                width: 100%;
            }

            .joint-controls {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Qarm Robot Simulator</h1>
            <p>4-DOF Robotic Arm Control - Web Version</p>
        </div>

        <div class="main-content">
            <div class="plot-container">
                <img id="plot" src="/api/plot" alt="3D Robot Plot">
            </div>

            <div class="controls">
                <div class="control-section">
                    <h3>🎯 Joint Controls</h3>
                    <div class="joint-controls">
                        <button class="joint-btn j1" onclick="moveJoint(0, -15)">J1 -</button>
                        <button class="joint-btn j1" onclick="moveJoint(0, 15)">J1 +</button>
                        <button class="joint-btn j2" onclick="moveJoint(1, -15)">J2 -</button>
                        <button class="joint-btn j2" onclick="moveJoint(1, 15)">J2 +</button>
                        <button class="joint-btn j3" onclick="moveJoint(2, -15)">J3 -</button>
                        <button class="joint-btn j3" onclick="moveJoint(2, 15)">J3 +</button>
                        <button class="joint-btn j4" onclick="moveJoint(3, -15)">J4 -</button>
                        <button class="joint-btn j4" onclick="moveJoint(3, 15)">J4 +</button>
                    </div>
                </div>

                <div class="control-section">
                    <h3>📷 View</h3>
                    <button class="view-btn" onclick="setView('front')">Front View</button>
                    <button class="view-btn" onclick="setView('side')">Side View</button>
                    <button class="view-btn" onclick="setView('top')">Top View</button>
                    <button class="view-btn" onclick="setView('iso')">3D View</button>
                </div>

                <div class="control-section">
                    <h3>⚡ Actions</h3>
                    <button class="action-btn btn-random" onclick="randomTarget()">🎲 Random Target</button>
                    <button class="action-btn btn-reset" onclick="resetRobot()">🔄 Reset</button>
                </div>

                <div class="control-section">
                    <h3>📊 Status</h3>
                    <div class="status">
                        <div class="status-row">
                            <span>J1 (Base):</span>
                            <span id="j1-val">0°</span>
                        </div>
                        <div class="status-row">
                            <span>J2 (Shoulder):</span>
                            <span id="j2-val">-90°</span>
                        </div>
                        <div class="status-row">
                            <span>J3 (Elbow):</span>
                            <span id="j3-val">0°</span>
                        </div>
                        <div class="status-row">
                            <span>J4 (Wrist):</span>
                            <span id="j4-val">0°</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Move joint
        async function moveJoint(joint, delta) {
            await fetch('/api/joint', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({joint, delta})
            });
            updatePlot();
            updateStatus();
        }

        // Set view
        async function setView(view) {
            await fetch('/api/view', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({view})
            });
            updatePlot();
        }

        // Reset robot
        async function resetRobot() {
            await fetch('/api/reset', {method: 'POST'});
            updatePlot();
            updateStatus();
        }

        // Random target
        async function randomTarget() {
            await fetch('/api/random_target', {method: 'POST'});
            updatePlot();
            updateStatus();
        }

        // Update plot image
        function updatePlot() {
            const img = document.getElementById('plot');
            img.src = '/api/plot?t=' + Date.now();
        }

        // Update status display
        async function updateStatus() {
            const res = await fetch('/api/status');
            const data = await res.json();

            document.getElementById('j1-val').textContent = data.joints[0].toFixed(0) + '°';
            document.getElementById('j2-val').textContent = data.joints[1].toFixed(0) + '°';
            document.getElementById('j3-val').textContent = data.joints[2].toFixed(0) + '°';
            document.getElementById('j4-val').textContent = data.joints[3].toFixed(0) + '°';
        }

        // Initial status update
        updateStatus();
    </script>
</body>
</html>
